<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>飞行器物理搭建环境</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Arial', sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            overflow: hidden;
        }
        
        #app {
            width: 100vw;
            height: 100vh;
            display: flex;
            flex-direction: column;
        }
        
        .header {
            background: rgba(0, 0, 0, 0.8);
            color: white;
            padding: 15px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            backdrop-filter: blur(10px);
        }
        
        .header h1 {
            font-size: 24px;
            font-weight: 300;
        }
        
        .controls {
            display: flex;
            gap: 10px;
        }
        
        .btn {
            background: rgba(255, 255, 255, 0.2);
            border: 1px solid rgba(255, 255, 255, 0.3);
            color: white;
            padding: 8px 16px;
            border-radius: 5px;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        
        .btn:hover {
            background: rgba(255, 255, 255, 0.3);
            transform: translateY(-1px);
        }
        
        .btn:active {
            transform: translateY(0);
        }
        
        .btn.primary {
            background: #4CAF50;
            border-color: #45a049;
        }
        
        .btn.danger {
            background: #f44336;
            border-color: #da190b;
        }
        
        .content {
            flex: 1;
            display: flex;
            position: relative;
        }
        
        .sidebar {
            width: 300px;
            background: rgba(0, 0, 0, 0.7);
            color: white;
            padding: 20px;
            backdrop-filter: blur(10px);
            border-right: 1px solid rgba(255, 255, 255, 0.1);
            overflow-y: auto;
        }
        
        .sidebar h2 {
            margin-bottom: 15px;
            font-size: 18px;
            font-weight: 300;
            border-bottom: 1px solid rgba(255, 255, 255, 0.2);
            padding-bottom: 10px;
        }
        
        .component-list {
            display: grid;
            gap: 10px;
            margin-bottom: 20px;
        }
        
        .component-item {
            background: rgba(255, 255, 255, 0.1);
            padding: 15px;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.3s ease;
            border: 1px solid transparent;
        }
        
        .component-item:hover {
            background: rgba(255, 255, 255, 0.2);
            border-color: rgba(255, 255, 255, 0.3);
        }
        
        .component-item.active {
            background: rgba(76, 175, 80, 0.3);
            border-color: #4CAF50;
        }
        
        .component-icon {
            width: 40px;
            height: 40px;
            background: rgba(255, 255, 255, 0.2);
            border-radius: 5px;
            margin-bottom: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        
        .component-name {
            font-weight: bold;
            margin-bottom: 5px;
        }
        
        .component-desc {
            font-size: 12px;
            opacity: 0.8;
        }
        
        .viewer {
            flex: 1;
            position: relative;
        }
        
        #physics-canvas {
            width: 100%;
            height: 100%;
            display: block;
        }
        
        .stats {
            position: absolute;
            top: 10px;
            left: 10px;
            background: rgba(0, 0, 0, 0.8);
            color: white;
            padding: 10px;
            border-radius: 5px;
            font-family: monospace;
            font-size: 12px;
        }
        
        .instructions {
            position: absolute;
            bottom: 10px;
            left: 10px;
            background: rgba(0, 0, 0, 0.8);
            color: white;
            padding: 10px;
            border-radius: 5px;
            font-size: 12px;
            max-width: 400px;
        }
        
        .physics-controls {
            position: absolute;
            top: 10px;
            right: 10px;
            background: rgba(0, 0, 0, 0.8);
            color: white;
            padding: 10px;
            border-radius: 5px;
            display: flex;
            flex-direction: column;
            gap: 5px;
        }
        
        .physics-toggle {
            display: flex;
            align-items: center;
            gap: 8px;
        }
        
        .toggle-switch {
            width: 40px;
            height: 20px;
            background: #666;
            border-radius: 10px;
            position: relative;
            cursor: pointer;
            transition: background 0.3s ease;
        }
        
        .toggle-switch.active {
            background: #4CAF50;
        }
        
        .toggle-switch::before {
            content: '';
            position: absolute;
            width: 16px;
            height: 16px;
            background: white;
            border-radius: 50%;
            top: 2px;
            left: 2px;
            transition: transform 0.3s ease;
        }
        
        .toggle-switch.active::before {
            transform: translateX(20px);
        }
        
        .nav-buttons {
            position: absolute;
            bottom: 10px;
            right: 10px;
            display: flex;
            gap: 10px;
        }
    </style>
</head>
<body>
    <div id="app">
        <div class="header">
            <h1>🚀 飞行器物理搭建环境</h1>
            <div class="controls">
                <button class="btn" onclick="clearScene()">清空场景</button>
                <button class="btn primary" onclick="addRandomComponent()">添加随机组件</button>
                <button class="btn" onclick="togglePhysics()">切换物理</button>
            </div>
        </div>
        
        <div class="content">
            <div class="sidebar">
                <h2>📦 飞行器组件</h2>
                <div class="component-list" id="component-list">
                    <!-- 组件列表将通过JavaScript动态生成 -->
                </div>
                
                <h2>⚙️ 物理设置</h2>
                <div class="physics-settings">
                    <div class="physics-toggle">
                        <span>重力:</span>
                        <div class="toggle-switch active" onclick="toggleGravity()"></div>
                        <span id="gravity-status">开启</span>
                    </div>
                    <div class="physics-toggle">
                        <span>碰撞检测:</span>
                        <div class="toggle-switch active" onclick="toggleCollisions()"></div>
                        <span id="collision-status">开启</span>
                    </div>
                </div>
            </div>
            
            <div class="viewer">
                <div id="physics-canvas"></div>
                
                <div class="stats" id="stats">
                    FPS: 60.0<br>
                    对象数量: 0<br>
                    物理状态: 运行中
                </div>
                
                <div class="instructions">
                    <strong>操作指南:</strong><br>
                    • 鼠标左键: 旋转视角<br>
                    • 鼠标右键: 平移视角<br>
                    • 鼠标滚轮: 缩放<br>
                    • G键: 切换网格显示<br>
                    • R键: 重置相机
                </div>
                
                <div class="physics-controls">
                    <div>物理模拟控制</div>
                    <button class="btn" onclick="startPhysics()">开始模拟</button>
                    <button class="btn" onclick="pausePhysics()">暂停模拟</button>
                    <button class="btn" onclick="resetPhysics()">重置模拟</button>
                </div>
                
                <div class="nav-buttons">
                    <button class="btn" onclick="goToStaticView()">切换到静态视图</button>
                </div>
            </div>
        </div>
    </div>

    <script type="module">
        import * as THREE from 'three';
        import { PhysicsWorld } from '../interfaces/physics-environment/physics-world.js';
        import { SceneManager } from '../core/scene-manager.js';
        import { CameraController } from '../core/camera-controller.js';
        import { GroundPlane } from '../core/ground-plane.js';
        import { DebugUtils } from '../utils/debug-utils.js';
        import { Fuselage } from '../core/aircraft-components/fuselage.js';
        import { Wing } from '../core/aircraft-components/wing.js';
        import { Engine } from '../core/aircraft-components/engine.js';

        class PhysicsBuilder {
            constructor() {
                this.canvas = document.getElementById('physics-canvas');
                this.sceneManager = new SceneManager();
                this.cameraController = new CameraController(this.canvas);
                this.groundPlane = new GroundPlane();
                this.physicsWorld = new PhysicsWorld();
                this.debugUtils = null;
                this.renderer = null;
                this.components = [];
                this.animationId = null;
                this.lastTime = 0;
                this.physicsEnabled = true;
                
                this.init();
            }

            async init() {
                this.setupScene();
                this.setupRenderer();
                this.setupPhysics();
                this.setupUI();
                this.animate();
                
                // 添加示例组件
                this.addExampleComponents();
            }

            setupScene() {
                this.scene = this.sceneManager.createScene();
                this.camera = this.cameraController.setupCamera();
                
                // 添加地面
                const ground = this.groundPlane.createPlane();
                this.sceneManager.addObject(ground);
                this.sceneManager.addObject(this.groundPlane.getGrid());
                
                // 添加调试工具
                this.debugUtils = new DebugUtils(this.scene);
                this.debugUtils.addAxesHelper(5);
                this.debugUtils.createStatsDisplay(this.canvas);
            }

            setupRenderer() {
                this.renderer = new THREE.WebGLRenderer({ 
                    antialias: true,
                    alpha: true 
                });
                this.renderer.setSize(this.canvas.clientWidth, this.canvas.clientHeight);
                this.renderer.setPixelRatio(window.devicePixelRatio);
                this.renderer.shadowMap.enabled = true;
                this.renderer.shadowMap.type = THREE.PCFSoftShadowMap;
                
                this.canvas.appendChild(this.renderer.domElement);
                this.cameraController.enableOrbitControls(this.renderer);
            }

            setupPhysics() {
                // 物理世界已初始化，添加地面到物理世界
                const groundMesh = this.groundPlane.getPlane();
                this.physicsWorld.addPhysicsObject(groundMesh, {
                    mass: 0,
                    shape: 'box',
                    dimensions: { x: 50, y: 0.1, z: 50 },
                    material: 'ground'
                });
            }

            setupUI() {
                this.populateComponentList();
                this.setupEventListeners();
            }

            populateComponentList() {
                const componentList = document.getElementById('component-list');
                const components = [
                    { type: 'fuselage', name: '机身', desc: '飞行器主体结构', color: '#4CAF50' },
                    { type: 'wing', name: '机翼', desc: '提供升力', color: '#2196F3' },
                    { type: 'engine', name: '引擎', desc: '提供推力', color: '#F44336' }
                ];

                components.forEach(comp => {
                    const item = document.createElement('div');
                    item.className = 'component-item';
                    item.innerHTML = `
                        <div class="component-icon" style="background: ${comp.color}">📦</div>
                        <div class="component-name">${comp.name}</div>
                        <div class="component-desc">${comp.desc}</div>
                    `;
                    item.onclick = () => this.addComponent(comp.type);
                    componentList.appendChild(item);
                });
            }

            setupEventListeners() {
                window.addEventListener('resize', () => this.onWindowResize());
                window.addEventListener('keydown', (e) => this.onKeyDown(e));
            }

            onWindowResize() {
                this.cameraController.updateAspectRatio();
                this.renderer.setSize(this.canvas.clientWidth, this.canvas.clientHeight);
            }

            onKeyDown(event) {
                switch(event.key) {
                    case 'g': case 'G':
                        this.groundPlane.toggleGrid();
                        break;
                    case 'r': case 'R':
                        this.cameraController.setCameraPosition(0, 10, 20);
                        break;
                }
            }

            addComponent(type) {
                let component;
                const position = new THREE.Vector3(
                    (Math.random() - 0.5) * 10,
                    5 + Math.random() * 5,
                    (Math.random() - 0.5) * 10
                );

                switch(type) {
                    case 'fuselage':
                        component = new Fuselage({ length: 8 + Math.random() * 4 });
                        break;
                    case 'wing':
                        component = new Wing({ 
                            span: 6 + Math.random() * 4,
                            chord: 1 + Math.random() * 1
                        });
                        break;
                    case 'engine':
                        component = new Engine({ 
                            thrust: 500 + Math.random() * 1000,
                            diameter: 0.5 + Math.random() * 0.5
                        });
                        break;
                }

                if (component) {
                    component.setPosition(position.x, position.y, position.z);
                    this.sceneManager.addObject(component.mesh);
                    this.components.push(component);

                    // 添加到物理世界
                    this.physicsWorld.addPhysicsObject(component.mesh, {
                        mass: 1,
                        shape: 'box',
                        dimensions: { x: 2, y: 1, z: 2 }
                    });

                    this.updateStats();
                }
            }

            addExampleComponents() {
                // 添加一些示例组件
                setTimeout(() => this.addComponent('fuselage'), 1000);
                setTimeout(() => this.addComponent('wing'), 1500);
                setTimeout(() => this.addComponent('engine'), 2000);
            }

            animate(currentTime = 0) {
                this.animationId = requestAnimationFrame((time) => this.animate(time));
                
                const deltaTime = (currentTime - this.lastTime) / 1000;
                this.lastTime = currentTime;

                // 更新物理模拟
                if (this.physicsEnabled) {
                    this.physicsWorld.updatePhysics(deltaTime);
                }

                // 更新控制器
                const controls = this.cameraController.getControls();
                if (controls) {
                    controls.update();
                }

                // 渲染场景
                this.renderer.render(this.scene, this.camera);

                // 更新调试信息
                this.updateStats();
            }

            updateStats() {
                const fps = this.lastTime ? (1000 / (performance.now() - this.lastTime)) : 0;
                this.debugUtils.updateStats(fps, this.components.length);
            }

            clearScene() {
                this.components.forEach(component => {
                    this.sceneManager.removeObject(component.mesh);
                    this.physicsWorld.removePhysicsObject(component.mesh);
                    component.dispose();
                });
                this.components = [];
                this.updateStats();
            }

            togglePhysics() {
                this.physicsEnabled = !this.physicsEnabled;
                const button = document.querySelector('[onclick="togglePhysics()"]');
                button.textContent = this.physicsEnabled ? '暂停物理' : '开启物理';
            }

            dispose() {
                if (this.animationId) {
                    cancelAnimationFrame(this.animationId);
                }
                this.clearScene();
                this.physicsWorld.dispose();
                this.debugUtils.clearHelpers();
                if (this.renderer) {
                    this.renderer.dispose();
                }
            }
        }

        // 全局函数
        let physicsBuilder;

        function init() {
            physicsBuilder = new PhysicsBuilder();
        }

        function clearScene() {
            if (physicsBuilder) physicsBuilder.clearScene();
        }

        function addRandomComponent() {
            if (physicsBuilder) {
                const types = ['fuselage', 'wing', 'engine'];
                const randomType = types[Math.floor(Math.random() * types.length)];
                physicsBuilder.addComponent(randomType);
            }
        }

        function togglePhysics() {
            if (physicsBuilder) physicsBuilder.togglePhysics();
        }

        function toggleGravity() {
            const toggle = document.querySelector('.physics-toggle .toggle-switch');
            const status = document.getElementById('gravity-status');
            toggle.classList.toggle('active');
            status.textContent = toggle.classList.contains('active') ? '开启' : '关闭';
        }

        function toggleCollisions() {
            const toggle = document.querySelectorAll('.physics-toggle .toggle-switch')[1];
            const status = document.getElementById('collision-status');
            toggle.classList.toggle('active');
            status.textContent = toggle.classList.contains('active') ? '开启' : '关闭';
        }

        function startPhysics() {
            if (physicsBuilder && !physicsBuilder.physicsEnabled) {
                physicsBuilder.togglePhysics();
            }
        }

        function pausePhysics() {
            if (physicsBuilder && physicsBuilder.physicsEnabled) {
                physicsBuilder.togglePhysics();
            }
        }

        function resetPhysics() {
            if (physicsBuilder) {
                physicsBuilder.clearScene();
                physicsBuilder.addExampleComponents();
            }
        }

        function goToStaticView() {
            window.location.href = 'static-showcase.html';
        }

        // 初始化应用
        window.addEventListener('DOMContentLoaded', init);
        
        // 清理资源
        window.addEventListener('beforeunload', () => {
            if (physicsBuilder) physicsBuilder.dispose();
        });
    </script>
</body>
</html>
